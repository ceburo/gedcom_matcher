<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
            <stop stop-color="#0B5FFF" />
            <stop offset="1" stop-color="#003C9E" />
        </linearGradient>
        <linearGradient id="glow" x1="760" y1="120" x2="1160" y2="530" gradientUnits="userSpaceOnUse">
            <stop stop-color="#8DEBFF" stop-opacity="0.35" />
            <stop offset="1" stop-color="#7CFFB2" stop-opacity="0.15" />
        </linearGradient>
        <linearGradient id="matchLine" x1="0" y1="0" x2="1" y2="1">
            <stop stop-color="#8DEBFF" />
            <stop offset="1" stop-color="#7CFFB2" />
        </linearGradient>
        <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="10" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Background -->
    <rect width="1200" height="630" fill="url(#bg)" />
    <rect width="1200" height="630" fill="url(#glow)" />

    <!-- Subtle grid -->
    <g opacity="0.12" stroke="white">
        <path d="M0 70H1200M0 140H1200M0 210H1200M0 280H1200M0 350H1200M0 420H1200M0 490H1200M0 560H1200" />
        <path d="M70 0V630M140 0V630M210 0V630M280 0V630M350 0V630M420 0V630M490 0V630M560 0V630M630 0V630" />
    </g>

    <!-- Left text block -->
    <text x="80" y="220" fill="white" font-family="Arial, sans-serif" font-size="92" font-weight="900">GEDCOM</text>
    <text x="80" y="310" fill="white" font-family="Arial, sans-serif" font-size="92" font-weight="900">Matcher</text>
    <text x="80" y="365" fill="#D8EAFF" font-family="Arial, sans-serif" font-size="40" font-weight="700">Compare • Score
        • Export</text>

    <!-- Badges -->
    <rect x="80" y="420" width="190" height="54" rx="27" fill="white" />
    <text x="175" y="456" text-anchor="middle" fill="#0B5FFF" font-family="Arial, sans-serif" font-size="24"
        font-weight="800">CLI + API</text>

    <rect x="286" y="420" width="270" height="54" rx="27" fill="#FFFFFF22" stroke="#FFFFFF66" />
    <text x="320" y="456" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="800">JSON • CSV •
        MD</text>

    <rect x="80" y="490" width="320" height="54" rx="27" fill="#FFFFFF22" stroke="#FFFFFF66" />
    <text x="240" y="526" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24"
        font-weight="800">Confidence 0 → 100</text>

    <rect x="416" y="490" width="190" height="54" rx="27" fill="#FFFFFF22" stroke="#FFFFFF66" />
    <text x="511" y="526" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24"
        font-weight="800">Pure Dart</text>

    <!-- Right visual: dual trees + matching links -->
    <g filter="url(#soft)">
        <!-- Left tree trunk -->
        <path d="M760 170L690 520H830L760 170Z" fill="#FFFFFF14" />
        <!-- Right tree trunk -->
        <path d="M1030 170L960 520H1100L1030 170Z" fill="#FFFFFF14" />

        <!-- Left tree nodes -->
        <circle cx="760" cy="185" r="32" fill="white" />
        <circle cx="700" cy="315" r="26" fill="white" fill-opacity="0.9" />
        <circle cx="820" cy="315" r="26" fill="white" fill-opacity="0.9" />
        <circle cx="660" cy="455" r="18" fill="white" fill-opacity="0.75" />
        <circle cx="740" cy="455" r="18" fill="white" fill-opacity="0.75" />
        <circle cx="820" cy="455" r="18" fill="white" fill-opacity="0.75" />

        <!-- Right tree nodes -->
        <circle cx="1030" cy="185" r="32" fill="white" />
        <circle cx="970" cy="315" r="26" fill="white" fill-opacity="0.9" />
        <circle cx="1090" cy="315" r="26" fill="white" fill-opacity="0.9" />
        <circle cx="930" cy="455" r="18" fill="white" fill-opacity="0.75" />
        <circle cx="1010" cy="455" r="18" fill="white" fill-opacity="0.75" />
        <circle cx="1090" cy="455" r="18" fill="white" fill-opacity="0.75" />

        <!-- Internal links -->
        <path d="M760 185L700 315M760 185L820 315" stroke="white" stroke-width="8" stroke-linecap="round" />
        <path d="M700 315L660 455M700 315L740 455" stroke="white" stroke-width="5" stroke-linecap="round" />
        <path d="M820 315L820 455" stroke="white" stroke-width="5" stroke-linecap="round" />

        <path d="M1030 185L970 315M1030 185L1090 315" stroke="white" stroke-width="8" stroke-linecap="round" />
        <path d="M970 315L930 455M970 315L1010 455" stroke="white" stroke-width="5" stroke-linecap="round" />
        <path d="M1090 315L1090 455" stroke="white" stroke-width="5" stroke-linecap="round" />

        <!-- Matching links between trees -->
        <path d="M700 315C790 250 885 250 970 315" stroke="url(#matchLine)" stroke-width="4" stroke-linecap="round"
            stroke-dasharray="10 9" />
        <path d="M740 455C830 420 925 420 1010 455" stroke="url(#matchLine)" stroke-width="4" stroke-linecap="round"
            stroke-dasharray="10 9" />
        <path d="M820 455C900 470 985 470 1090 455" stroke="url(#matchLine)" stroke-width="4" stroke-linecap="round"
            stroke-dasharray="10 9" />

        <!-- Confidence chip -->
        <rect x="840" y="70" width="250" height="56" rx="28" fill="#7CFFB222" stroke="#7CFFB2AA" />
        <text x="965" y="107" text-anchor="middle" fill="#D9FFE9" font-family="Arial, sans-serif" font-size="24"
            font-weight="800">Match Confidence</text>
    </g>
</svg>