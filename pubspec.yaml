name: gedcom_matcher
description: A configurable CLI to compare two GEDCOM files and detect likely person matches.
version: 0.1.0
homepage: https://github.com/ceburo/gedcom_matcher
repository: https://github.com/ceburo/gedcom_matcher
issue_tracker: https://github.com/ceburo/gedcom_matcher/issues

topics:
  - gedcom
  - genealogy
  - cli
  - matching

environment:
  sdk: ^3.10.4

dependencies:
  args: ^2.7.0
  gedcom_parser: ^0.0.8

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6

executables:
  gedcom_matcher: gedcom_matcher
